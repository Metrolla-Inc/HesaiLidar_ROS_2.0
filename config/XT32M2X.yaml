lidar:
  - driver:
      use_gpu: false
      source_type: 1
      lidar_udp_type:
        device_ip_address: 192.168.1.201
        udp_port: 2368
        ptc_port: 9347
        use_ptc_connected: true
        correction_file_path: "/hesai_ws/src/driver/HesaiLidar_SDK_2.0/correction/angle_correction/XT32M2X_Angle Correction File.csv"
        firetimes_path: "/hesai_ws/src/driver/HesaiLidar_SDK_2.0/correction/firetime_correction/PandarXT-32M2X_Firetime Correction File.csv"
        use_someip: false
        host_ip_address: "192.168.1.100"
        fault_message_port: 0
        standby_mode: -1
        speed: -1
        ptc_mode: 0
        certFile: ""
        privateKeyFile: ""
        caFile: ""
      pcap_type:
        pcap_path: ""
        correction_file_path: ""
        firetimes_path: ""
        pcap_play_synchronization: true
        pcap_play_in_loop: false
      rosbag_type:
        correction_file_path: ""
        firetimes_path: ""
      serial_type:
        rs485_com: "/dev/ttyUSB0"
        point_cloud_baudrate: 3125000
        correction_save_path: ""
        correction_file_path: ""
      use_timestamp_type: 0
      frame_start_azimuth: 0
      transform_flag: false
      x: 0
      y: 0
      z: 0
      roll: 180
      pitch: 0
      yaw: 0
      fov_start: -1
      fov_end:  -1
      enable_packet_loss_tool: true
      distance_correction_flag: false
      xt_spot_correction: false
      device_udp_src_port: 0
      device_fault_port: 0
    ros:
      ros_frame_id: hesai_lidar
      ros_recv_packet_topic: /lidar_packets
      ros_send_packet_topic: /lidar_packets
      ros_send_point_cloud_topic: /lidar_points
      ros_send_imu_topic: /lidar_imu
      ros_send_packet_loss_topic: /lidar_packets_loss
      send_packet_ros: true
      send_point_cloud_ros: true
      send_imu_ros: true
