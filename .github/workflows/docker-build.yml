name: Docker Build and Push

on:
  push:
    branches:
      - ROS2/main
      - ROS2/dev
      - 'v*'
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.PACKAGES_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: castaway2000
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Compute sanitized Docker tag
        id: tag
        shell: bash
        run: |
          REF_NAME="${{ github.ref_name }}"
          # replace "/" with "-", lowercase, and collapse any disallowed characters
          SAFE_TAG="${REF_NAME//\//-}"
          SAFE_TAG="${SAFE_TAG,,}"
          SAFE_TAG="$(echo "$SAFE_TAG" | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+|-+$//g')"
          echo "tag=$SAFE_TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $SAFE_TAG"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/metrolla-inc/hesai_driver:${{ steps.tag.outputs.tag }}
          platforms: linux/amd64,linux/arm64
